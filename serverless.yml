service: serverless-python

provider:
  name: aws
  runtime: python3.8
  profile: varokas
  region: us-west-2

functions:
  hello:
    handler: handler.hello
    events:
      - http:
          path: hello          
          method: get

plugins:
  - serverless-python-requirements
custom:
  pythonRequirements:
    dockerizePip: true